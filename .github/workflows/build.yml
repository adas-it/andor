name: .NET

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Andor Accounts
            projectName: Src/Budget/Andor.Accounts.Domain/Andor.Accounts.Domain.csproj
            projectTestName: Tests/Budget/Andor.Accounts.Domain.Tests/Andor.Accounts.Domain.Tests.csproj
            sonarProjectKey: adas-it_andor-accounts
            coverageFile: coverage-andor-accounts.xml
          - name: Andor Investments
            projectName: Src/Assets/Andor.Assets.Domain/Andor.Assets.Domain.csproj
            projectTestName: Tests/Assets/Andor.Assets.Domain.Tests/Andor.Assets.Domain.Tests.csproj
            sonarProjectKey: adas-it_andor-investments
            coverageFile: coverage-andor-investments.xml
          - name: Andor User Identity
            projectName: Src/Administrations/Users/Andor.Users.WebApi/Andor.Users.WebApi.csproj
            projectTestName: Tests/Administrations/Users/Andor.Users.Domain.Tests/Andor.Users.Domain.Tests.csproj
            sonarProjectKey: adas-it_andor-users-identity
            coverageFile: coverage-andor-users-identity.xml
          - name: Andor Communications
            projectName: Src/Communications/Andor.Communications.Domain/Andor.Communications.Domain.csproj
            projectTestName: Tests/Communications/Andor.Communications.Domain.Tests/Andor.Communications.Domain.Tests.csproj
            sonarProjectKey: adas-it_andor-communications
            coverageFile: coverage-andor-communications.xml
          - name: Andor Onboarding
            projectName: Src/Onboarding/Andor.Onboarding.Domain/Andor.Onboarding.Domain.csproj
            projectTestName: Tests/Onboarding/Andor.Onboarding.Domain.Tests/Andor.Onboarding.Domain.Tests.csproj
            sonarProjectKey: adas-it_andor-onboarding
            coverageFile: coverage-andor-onboarding.xml

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Restore dependencies
        run: |
          dotnet restore ${{ matrix.projectName }}
          dotnet restore ${{ matrix.projectTestName }}

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"${{ matrix.sonarProjectKey }}" \
            /o:"adas-it" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.exclusions="docs/**,k8s/**,.github/**" \
            /d:sonar.cs.vscoveragexml.reportsPaths=${{ matrix.coverageFile }}

      - name: Build
        run: |
          dotnet build ${{ matrix.projectName }} --no-restore --configuration Release
          dotnet build ${{ matrix.projectTestName }} --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet-coverage collect 'dotnet test ${{ matrix.projectTestName }} --no-build --configuration Release --verbosity normal' -f xml -o '${{ matrix.coverageFile }}'
    
      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"